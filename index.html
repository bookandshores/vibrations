<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBRATIONS • INNER LIGHT</title>
  
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">
    <link rel="manifest" href="site.webmanifest">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap');
        
        :root {
            --gold: #FFCC00;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Oswald', sans-serif;
            background: #05020F;
            color: #DDD;
            overflow-x: hidden;
            line-height: 1.4;
        }
        
        /* NAV */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(5,2,15,0.7);
            backdrop-filter: blur(8px);
        }
        
        .logo {
            font-size: 1.6rem;
            letter-spacing: 6px;
            color: var(--gold);
        }
        
        /* HERO / SANCTUARY */
        .sanctuary {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            text-align: center;
            padding: 0 20px;
        }
        
        .sanctuary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255,204,0,0.12) 0%, transparent 70%);
            animation: breath 30s ease infinite;
        }
        
        @keyframes breath {
            0%,100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .mandala {
            width: 280px;
            height: 280px;
            border: 3px solid rgba(255,204,0,0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3rem;
            position: relative;
        }
        
        .mandala img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .sanctuary h1 {
            font-size: 4.2rem;
            letter-spacing: 12px;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }
        
        .sanctuary p {
            font-size: 1.4rem;
            max-width: 520px;
            color: #AAA;
        }
        
        /* OFFERINGS */
        .offerings {
            padding: 6rem 5% 8rem;
            background: #0A061F;
        }
        
        .section-title {
            text-align: center;
            font-size: 2.8rem;
            letter-spacing: 8px;
            color: var(--gold);
            margin-bottom: 4rem;
        }
        
        .tracks {
            display: flex;
            flex-direction: column;
            gap: 5rem;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .track {
            display: flex;
            align-items: center;
            gap: 2rem;
            background: rgba(255,255,255,0.03);
            padding: 1.5rem;
            border-left: 6px solid var(--gold);
        }
        
        .track-art {
            width: 180px;
            height: 180px;
            flex-shrink: 0;
            border: 3px solid var(--gold);
        }
        
        .track-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .track-details {
            flex: 1;
        }
        
        .track-details h3 {
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }
        
        /* FOOTER */
        footer {
            text-align: center;
            padding: 4rem 5%;
            background: #05020F;
            color: #777;
        }
        
        @media (max-width: 768px) {
            .track { flex-direction: column; text-align: center; }
            .sanctuary h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">VIBRATIONS</div>
    </nav>

    <!-- Sanctuary -->
    <section class="sanctuary">
        <div class="mandala">
            <img src="p4.jpg" alt="Divine Light">
        </div>
        <h1>VIBRATIONS</h1>
        <p style="font-size:1.5rem; margin-bottom:2rem;">A Sanctuary of Sound</p>
        <p style="max-width:460px; font-style:italic;">
            These spontaneous guitar meditations flow directly from the presence of Paramahansa Yogananda.
        </p>
        
        <button onclick="document.getElementById('offerings').scrollIntoView({behavior: 'smooth'})" 
                style="margin-top:3rem; padding:1rem 3rem; background:transparent; border:2px solid #FFCC00; color:#FFCC00; font-size:1.2rem; letter-spacing:4px; cursor:pointer;">
            ENTER THE TEMPLE
        </button>
    </section>

    <!-- Offerings -->
    <section id="offerings" class="offerings">
        <h2 class="section-title">COSMIC OFFERINGS</h2>
        
        <div class="tracks">
            <!-- Track 1 -->
            <div class="track">
                <div class="track-art">
                    <img src="SPIRIT EYE.jpg" alt="Spirit Eye">
                </div>
                <div class="track-details">
                    <h3>I</h3>
                    <audio controls style="width:100%; margin-top:1rem;">
                        <source src="music/ocean-of-bliss.mp3" type="audio/mpeg">
                    </audio>
                </div>
            </div>
            
            <!-- Track 2 -->
            <div class="track">
                <div class="track-art">
                    <img src="SPIRIT EYE.jpg" alt="Spirit Eye">
                </div>
                <div class="track-details">
                    <h3>II</h3>
                    <audio controls style="width:100%; margin-top:1rem;">
                        <source src="music/yoganandas-dream.mp3" type="audio/mpeg">
                    </audio>
                </div>
            </div>
            
            <!-- Track 3 -->
            <div class="track">
                <div class="track-art">
                    <img src="SPIRIT EYE.jpg" alt="Spirit Eye">
                </div>
                <div class="track-details">
                    <h3>III</h3>
                    <audio controls style="width:100%; margin-top:1rem;">
                        <source src="music/light-of-the-soul.mp3" type="audio/mpeg">
                    </audio>
                </div>
            </div>
        </div>
    </section>

    <!-- Closing -->
    <footer>
        <p style="margin-bottom:1rem;">The music is not mine. It flows through.</p>
        <p>
            <a href="https://musicvibes.world/donate" target="_blank" style="color:#FFCC00; text-decoration:none;">Support These Vibrations</a>
        </p>
    </footer>

    <script>
        document.querySelectorAll('audio').forEach(audio => {
            audio.addEventListener('play', () => {
                document.querySelectorAll('audio').forEach(a => {
                    if (a !== audio) a.pause();
                });
            });
        });
    </script>
</body>
</html>
